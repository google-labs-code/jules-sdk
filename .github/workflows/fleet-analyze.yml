# Generated by @google/jules-fleet init
# https://github.com/google-labs-code/jules-sdk

name: Fleet Analyze

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      goal:
        description: 'Path to goal file (or blank for all)'
        type: string
        default: ''
      milestone:
        description: 'Milestone ID override'
        type: string
        default: ''

concurrency:
  group: fleet-analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate Fleet App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
      - run: |
          npm install --prefix /tmp/fleet @google/jules-fleet
          /tmp/fleet/node_modules/.bin/jules-fleet analyze --goal "${{ inputs.goal }}" --milestone "${{ inputs.milestone }}"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_APP_ID: ${{ secrets.FLEET_APP_ID }}
          GITHUB_APP_PRIVATE_KEY_BASE64: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.FLEET_APP_INSTALLATION_ID }}
